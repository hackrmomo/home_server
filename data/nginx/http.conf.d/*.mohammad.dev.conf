server {
  server_name ~^(?<subdomain>.+)\.mohammad\.dev mohammad.dev;
  include conf.d/snippets/server.conf;

  location / {
    include conf.d/snippets/location.conf;
    proxy_pass http://${subdomain}mohammad$request_uri;
  }
}

server {
  server_name admin.mohammad.dev;
  include conf.d/snippets/server.conf;
  include conf.d/snippets/localOnlyAccess.conf;
  
  location / {
    include conf.d/snippets/location.conf;
    proxy_pass http://adminmohammad$request_uri;
  }
}