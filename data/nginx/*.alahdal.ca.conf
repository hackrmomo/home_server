server {
  listen 443 ssl;
  server_name ~^(?<subdomain>.+)\.alahdal\.ca alahdal.ca;

  # Docker DNS
  resolver 127.0.0.11;

  ssl_certificate /etc/letsencrypt/live/hackrlabs.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hackrlabs.dev/privkey.pem;

  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    # Web Sockets
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Set Headers
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;

    proxy_pass http://${subdomain}alahdal$request_uri;
  }
}